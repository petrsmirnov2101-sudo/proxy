<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Яндекс.Диск — Прокси</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6; color: #1f2937; padding: 2rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .status { color: #6b7280; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .file-list { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
    .file-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1.25rem; border-bottom: 1px solid #f0f0f0;
      transition: background .15s;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: #f9fafb; }
    .icon { font-size: 1.3rem; flex-shrink: 0; }
    .name { flex: 1; min-width: 0; }
    .name a {
      color: #2563eb; text-decoration: none; word-break: break-word;
    }
    .name a:hover { text-decoration: underline; }
    .folder-link {
      color: #1f2937; font-weight: 600; cursor: pointer;
      word-break: break-word;
    }
    .folder-link:hover { color: #2563eb; }
    .size { color: #9ca3af; font-size: 0.85rem; white-space: nowrap; }
    .breadcrumbs {
      margin-bottom: 1rem; font-size: 0.9rem; display: flex;
      flex-wrap: wrap; gap: 0.25rem; align-items: center;
    }
    .breadcrumbs span { color: #9ca3af; }
    .breadcrumbs a { color: #2563eb; text-decoration: none; cursor: pointer; }
    .breadcrumbs a:hover { text-decoration: underline; }
    .error { background: #fef2f2; color: #b91c1c; padding: 1rem; border-radius: 8px; }
    .loading { text-align: center; padding: 3rem; color: #9ca3af; }
  </style>
</head>
<body>
<div class="container">
  <h1>📂 Яндекс.Диск — Прокси</h1>
  <div id="breadcrumbs" class="breadcrumbs"></div>
  <div id="status" class="status">Загрузка…</div>
  <div id="files" class="file-list">
    <div class="loading">⏳ Получаем список файлов…</div>
  </div>
</div>

<script>
(function () {
  var PUBLIC_KEY = 'https://disk.yandex.ru/d/iasXYBeFB3Kqew';
  var currentPath = '/';

  function proxyUrl(action, path, filename) {
    var url = '/api/proxy?action=' + action
      + '&public_key=' + encodeURIComponent(PUBLIC_KEY)
      + '&path=' + encodeURIComponent(path || '/');
    if (filename) {
      url += '&filename=' + encodeURIComponent(filename);
    }
    return url;
  }

  function formatSize(bytes) {
    if (!bytes && bytes !== 0) return '';
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' КБ';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' МБ';
    return (bytes / 1073741824).toFixed(2) + ' ГБ';
  }

  function renderBreadcrumbs() {
    var el = document.getElementById('breadcrumbs');
    if (currentPath === '/') {
      el.innerHTML = '<strong>Корень</strong>';
      return;
    }
    var parts = currentPath.replace(/^\//, '').replace(/\/$/, '').split('/');
    var html = '<a onclick="window.__navigate(\'/\')">Корень</a>';
    var accumulated = '';
    for (var i = 0; i < parts.length; i++) {
      accumulated += '/' + parts[i];
      html += ' <span>/</span> ';
      if (i === parts.length - 1) {
        html += '<strong>' + parts[i] + '</strong>';
      } else {
        html += '<a onclick="window.__navigate(\'' + accumulated.replace(/'/g, "\\'") + '\')">' + parts[i] + '</a>';
      }
    }
    el.innerHTML = html;
  }

  function loadFiles(path) {
    currentPath = path || '/';
    renderBreadcrumbs();

    var statusEl = document.getElementById('status');
    var filesEl  = document.getElementById('files');
    statusEl.textContent = 'Загрузка…';
    filesEl.innerHTML = '<div class="loading">⏳ Получаем список файлов…</div>';

    fetch(proxyUrl('list', currentPath))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          statusEl.textContent = 'Ошибка';
          filesEl.innerHTML = '<div class="error">❌ ' + (data.message || data.error) + '</div>';
          return;
        }

        var items = (data._embedded && data._embedded.items) || [];
        var folderName = data.name || 'Папка';
        statusEl.textContent = folderName + ' — ' + items.length + ' элемент(ов)';

        if (items.length === 0) {
          filesEl.innerHTML = '<div class="loading">Папка пуста</div>';
          return;
        }

        // Папки сначала, потом файлы
        items.sort(function (a, b) {
          if (a.type === 'dir' && b.type !== 'dir') return -1;
          if (a.type !== 'dir' && b.type === 'dir') return 1;
          return a.name.localeCompare(b.name);
        });

        var html = '';
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          if (item.type === 'dir') {
            html += '<div class="file-item">'
              + '<span class="icon">📁</span>'
              + '<span class="name"><span class="folder-link" onclick="window.__navigate(\'' + item.path.replace(/'/g, "\\'") + '\')">' + item.name + '</span></span>'
              + '</div>';
          } else {
            // ★ Передаём &filename= с оригинальным именем
            var href = proxyUrl('fetch', item.path, item.name);
            html += '<div class="file-item">'
              + '<span class="icon">📄</span>'
              + '<span class="name"><a href="' + href + '" target="_blank" rel="noopener">' + item.name + '</a></span>'
              + '<span class="size">' + formatSize(item.size) + '</span>'
              + '</div>';
          }
        }
        filesEl.innerHTML = html;
      })
      .catch(function (err) {
        statusEl.textContent = 'Ошибка сети';
        filesEl.innerHTML = '<div class="error">❌ ' + err.message + '</div>';
      });
  }

  window.__navigate = function (path) { loadFiles(path); };

  // Старт
  loadFiles('/');
})();
</script>
</body>
</html>
