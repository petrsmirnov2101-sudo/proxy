<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YaDisk Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
  .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .input-row input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: #eee; font-size: 14px; }
  .input-row button { padding: 12px 24px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .input-row button:hover { background: #c23152; }
  .breadcrumbs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; align-items: center; }
  .breadcrumbs span { color: #888; }
  .breadcrumbs a { color: #0f9; cursor: pointer; text-decoration: none; }
  .breadcrumbs a:hover { text-decoration: underline; }
  .file-list { background: #16213e; border-radius: 12px; overflow: hidden; }
  .file-item { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid #1a1a2e; cursor: default; transition: background 0.15s; }
  .file-item:hover { background: #1a1a3e; }
  .file-item:last-child { border-bottom: none; }
  .file-item.folder { cursor: pointer; }
  .file-icon { font-size: 24px; margin-right: 14px; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: #888; margin-top: 2px; }
  .download-btn { display: inline-block; padding: 6px 16px; border-radius: 6px; border: none; background: #0f9; color: #000; font-size: 13px; cursor: pointer; font-weight: 600; flex-shrink: 0; text-decoration: none; }
  .download-btn:hover { background: #0da; }
  .status { text-align: center; padding: 40px; color: #888; }
  .error { color: #e94560; }
  .loading { color: #0f9; }
</style>
</head>
<body>
<div class="container">
  <h1>📁 YaDisk Browser</h1>
  <div class="input-row">
    <input type="text" id="urlInput" value="https://disk.yandex.ru/d/iasXYBeFB3Kqew" placeholder="Ссылка на Яндекс.Диск">
    <button onclick="openDisk()">Открыть</button>
  </div>
  <div class="breadcrumbs" id="breadcrumbs"></div>
  <div class="file-list" id="fileList">
    <div class="status">Вставьте ссылку и нажмите «Открыть»</div>
  </div>
</div>

<script>
  var currentKey = '';
  var currentPath = '/';

  function openDisk() {
    currentKey = document.getElementById('urlInput').value.trim();
    currentPath = '/';
    loadFolder();
  }

  function buildFetchUrl(path) {
    var params = new URLSearchParams({ action: 'fetch', public_key: currentKey });
    if (path && path !== '/') params.set('path', path);
    return '/api/proxy?' + params.toString();
  }

  async function loadFolder() {
    var list = document.getElementById('fileList');
    list.innerHTML = '<div class="status loading">⏳ Загрузка...</div>';

    var params = new URLSearchParams({ action: 'list', public_key: currentKey });
    if (currentPath && currentPath !== '/') params.set('path', currentPath);

    try {
      var resp = await fetch('/api/proxy?' + params.toString());
      var data = await resp.json();

      if (data.error || data.message) {
        list.innerHTML = '<div class="status error">❌ ' + escapeHtml(data.error || data.message || 'Ошибка') + '</div>';
        return;
      }

      renderBreadcrumbs();

      var items = data._embedded ? data._embedded.items : null;

      if (!items) {
        list.innerHTML = '<div class="status">Это файл: ' + escapeHtml(data.name || '?') + '</div>';
        window.location.href = buildFetchUrl(currentPath);
        return;
      }

      if (items.length === 0) {
        list.innerHTML = '<div class="status">📭 Папка пуста</div>';
        return;
      }

      items.sort(function(a, b) {
        if (a.type === 'dir' && b.type !== 'dir') return -1;
        if (a.type !== 'dir' && b.type === 'dir') return 1;
        return a.name.localeCompare(b.name);
      });

      var html = '';
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
        var size = item.type === 'dir' ? '' : formatSize(item.size);

        if (item.type === 'dir') {
          html += '<div class="file-item folder" data-path="' + escapeHtml(item.path) + '">'
            + '<div class="file-icon">' + icon + '</div>'
            + '<div class="file-info">'
            + '<div class="file-name">' + escapeHtml(item.name) + '</div>'
            + '</div>'
            + '</div>';
        } else {
          var dlUrl = buildFetchUrl(item.path);
          html += '<div class="file-item">'
            + '<div class="file-icon">' + icon + '</div>'
            + '<div class="file-info">'
            + '<div class="file-name">' + escapeHtml(item.name) + '</div>'
            + '<div class="file-size">' + size + '</div>'
            + '</div>'
            + '<a class="download-btn" href="' + escapeHtml(dlUrl) + '" target="_blank" rel="noopener">Скачать</a>'
            + '</div>';
        }
      }

      list.innerHTML = html;

      // Обработчик кликов по папкам
      var folders = list.querySelectorAll('.file-item.folder');
      for (var j = 0; j < folders.length; j++) {
        folders[j].addEventListener('click', function() {
          var p = this.getAttribute('data-path');
          navigate(p);
        });
      }

    } catch (err) {
      list.innerHTML = '<div class="status error">❌ Сетевая ошибка: ' + escapeHtml(err.message) + '</div>';
    }
  }

  function navigate(path) {
    currentPath = path;
    loadFolder();
  }

  function renderBreadcrumbs() {
    var bc = document.getElementById('breadcrumbs');
    if (currentPath === '/') {
      bc.innerHTML = '<a onclick="navigate(\'/\')">🏠 Корень</a>';
      return;
    }
    var parts = currentPath.split('/').filter(Boolean);
    var html = '<a onclick="navigate(\'/\')">🏠 Корень</a>';
    var accumulated = '';
    for (var i = 0; i < parts.length; i++) {
      accumulated += '/' + parts[i];
      html += ' <span>/</span> ';
      if (i === parts.length - 1) {
        html += '<span style="color:#eee">' + escapeHtml(decodeURIComponent(parts[i])) + '</span>';
      } else {
        html += '<a onclick="navigate(\'' + escapeAttr(accumulated) + '\')">' + escapeHtml(decodeURIComponent(parts[i])) + '</a>';
      }
    }
    bc.innerHTML = html;
  }

  function getFileIcon(name) {
    var ext = (name.split('.').pop() || '').toLowerCase();
    var icons = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📎', pptx:'📎', jpg:'🖼', jpeg:'🖼', png:'🖼', gif:'🖼', svg:'🖼', mp4:'🎬', avi:'🎬', mkv:'🎬', mp3:'🎵', wav:'🎵', zip:'📦', rar:'📦', '7z':'📦', tar:'📦', gz:'📦', txt:'📃', py:'🐍', js:'📜', html:'🌐', css:'🎨', json:'📋' };
    return icons[ext] || '📄';
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escapeAttr(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }
</script>
</body>
</html>
