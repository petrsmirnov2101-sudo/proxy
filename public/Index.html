<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YaDisk Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 20px; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
    }
    .search-bar button {
      padding: 12px 24px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .search-bar button:hover { background: #45a049; }

    .breadcrumb {
      padding: 10px 0;
      color: #666;
      margin-bottom: 10px;
    }
    .breadcrumb span {
      cursor: pointer;
      color: #2196F3;
    }
    .breadcrumb span:hover { text-decoration: underline; }

    .file-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    .item:hover { background: #f9f9f9; }
    .item:last-child { border-bottom: none; }

    .item-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
    }
    .folder-name {
      cursor: pointer;
      color: #2196F3;
      font-weight: 500;
    }
    .folder-name:hover { text-decoration: underline; }

    .item-size { color: #999; font-size: 13px; }

    .download-btn {
      padding: 6px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .download-btn:hover { background: #45a049; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #f44336;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>

  <h1>📂 YaDisk Browser</h1>

  <div class="search-bar">
    <input id="url" placeholder="Вставь ссылку на Яндекс.Диск" value="">
    <button onclick="browse()">Открыть</button>
  </div>

  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="content"></div>

  <script>
    let currentPublicKey = '';
    let currentPath = '';

    async function browse(path) {
      const input = document.getElementById('url');
      const content = document.getElementById('content');

      if (path !== undefined) {
        currentPath = path;
      } else {
        currentPublicKey = input.value.trim();
        currentPath = '';
      }

      if (!currentPublicKey) {
        content.innerHTML = '<div class="empty">Вставь ссылку и нажми "Открыть"</div>';
        return;
      }

      content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

      let url = `/api/proxy?action=list&public_key=${encodeURIComponent(currentPublicKey)}`;
      if (currentPath) url += `&path=${encodeURIComponent(currentPath)}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          content.innerHTML = `<div class="error">❌ ${data.error || 'Ошибка'}</div>`;
          return;
        }

        updateBreadcrumb();

        const items = data._embedded?.items || [];

        if (items.length === 0) {
          // Это файл, а не папка — скачиваем
          if (data.file) {
            downloadFile(currentPath || '/');
            return;
          }
          content.innerHTML = '<div class="empty">Папка пуста</div>';
          return;
        }

        let html = '<div class="file-list">';

        items.forEach(item => {
          if (item.type === 'dir') {
            html += `
              <div class="item">
                <div class="item-name">
                  <span>📁</span>
                  <span class="folder-name" onclick="browse('${item.path}')">${item.name}</span>
                </div>
              </div>`;
          } else {
            const size = formatSize(item.size);
            html += `
              <div class="item">
                <div class="item-name">
                  <span>${getIcon(item.name)}</span>
                  <span>${item.name}</span>
                  <span class="item-size">${size}</span>
                </div>
                <button class="download-btn" onclick="downloadFile('${item.path}')">⬇ Скачать</button>
              </div>`;
          }
        });

        html += '</div>';
        content.innerHTML = html;

      } catch (err) {
        content.innerHTML = `<div class="error">❌ ${err.message}</div>`;
      }
    }

    async function downloadFile(path) {
      const url = `/api/proxy?action=download&public_key=${encodeURIComponent(currentPublicKey)}&path=${encodeURIComponent(path)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.href) {
        window.location.href = data.href;
      } else {
        alert('Не удалось получить ссылку на скачивание');
      }
    }

    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      if (!currentPath) {
        bc.innerHTML = '📂 Корень диска';
        return;
      }

      const parts = currentPath.replace(/^\//, '').split('/');
      let html = '<span onclick="browse(\'\')">📂 Корень</span>';

      let accumulated = '';
      parts.forEach((part, i) => {
        accumulated += '/' + part;
        const p = accumulated;
        if (i < parts.length - 1) {
          html += ` / <span onclick="browse('${p}')">${part}</span>`;
        } else {
          html += ` / ${part}`;
        }
      });

      bc.innerHTML = html;
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
      return (bytes / 1073741824).toFixed(1) + ' GB';
    }

    function getIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = {
        pdf: '📕', doc: '📘', docx: '📘', txt: '📄',
        jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼',
        mp4: '🎬', avi: '🎬', mp3: '🎵', wav: '🎵',
        zip: '📦', rar: '📦', '7z': '📦',
        xls: '📊', xlsx: '📊', csv: '📊',
        ppt: '📙', pptx: '📙',
      };
      return icons[ext] || '📄';
    }

    // Enter для поиска
    document.getElementById('url').addEventListener('keypress', e => {
      if (e.key === 'Enter') browse();
    });
  </script>
</body>
</html>
