<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YaDisk Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 20px; color: #5bb5f0; font-size: 1.5em; }
  .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
  input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; outline: none; }
  input[type="text"]:focus { border-color: #5bb5f0; }
  button { padding: 12px 24px; border: none; border-radius: 8px; background: #5bb5f0; color: #000; font-weight: 600; cursor: pointer; font-size: 14px; white-space: nowrap; }
  button:hover { background: #7cc8f7; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .breadcrumbs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; align-items: center; font-size: 14px; }
  .breadcrumbs span { color: #666; }
  .breadcrumbs a { color: #5bb5f0; text-decoration: none; cursor: pointer; }
  .breadcrumbs a:hover { text-decoration: underline; }
  .file-list { background: #1a1a1a; border-radius: 10px; border: 1px solid #2a2a2a; overflow: hidden; }
  .file-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; gap: 12px; transition: background 0.15s; }
  .file-item:last-child { border-bottom: none; }
  .file-item:hover { background: #222; }
  .file-icon { font-size: 24px; width: 32px; text-align: center; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-name.folder { color: #5bb5f0; cursor: pointer; }
  .file-name.folder:hover { text-decoration: underline; }
  .file-size { font-size: 12px; color: #888; margin-top: 2px; }
  .download-btn { padding: 6px 16px; border: none; border-radius: 6px; background: #2d7d3a; color: #fff; cursor: pointer; font-size: 13px; flex-shrink: 0; }
  .download-btn:hover { background: #36963f; }
  .status { text-align: center; padding: 40px; color: #888; }
  .error { color: #f05b5b; }
  .loading { color: #5bb5f0; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #5bb5f0; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>📁 Yandex.Disk Browser</h1>

  <div class="input-group">
    <input type="text" id="linkInput" placeholder="Вставьте ссылку Яндекс.Диска..." value="https://disk.yandex.ru/d/iasXYBeFB3Kqew">
    <button id="goBtn" onclick="loadRoot()">Открыть</button>
  </div>

  <div id="breadcrumbs" class="breadcrumbs" style="display:none;"></div>
  <div id="fileList"></div>
</div>

<script>
const API_BASE = '/api/proxy';
let currentPublicKey = '';

function formatSize(bytes) {
  if (!bytes) return '';
  const units = ['Б', 'КБ', 'МБ', 'ГБ'];
  let i = 0;
  let size = bytes;
  while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
  return size.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function getIcon(item) {
  if (item.type === 'dir') return '📁';
  const ext = (item.name || '').split('.').pop().toLowerCase();
  const icons = { pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📽', pptx: '📽', jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', mp4: '🎬', avi: '🎬', mp3: '🎵', zip: '📦', rar: '📦', '7z': '📦', txt: '📃', csv: '📃', exe: '⚙️' };
  return icons[ext] || '📄';
}

function showStatus(msg, type) {
  const el = document.getElementById('fileList');
  const cls = type === 'error' ? 'error' : type === 'loading' ? 'loading' : '';
  const prefix = type === 'loading' ? '<span class="spinner"></span>' : '';
  el.innerHTML = `<div class="status ${cls}">${prefix}${msg}</div>`;
}

async function apiCall(action, publicKey, path) {
  let url = `${API_BASE}?action=${action}&public_key=${encodeURIComponent(publicKey)}`;
  if (path) url += `&path=${encodeURIComponent(path)}`;
  const resp = await fetch(url);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
  return data;
}

async function loadRoot() {
  const link = document.getElementById('linkInput').value.trim();
  if (!link) return;
  currentPublicKey = link;
  await navigate('');
}

async function navigate(path) {
  showStatus('Загрузка...', 'loading');
  document.getElementById('breadcrumbs').style.display = 'none';

  try {
    const data = await apiCall('list', currentPublicKey, path || '');
    renderBreadcrumbs(path || '', data.name);
    renderFiles(data, path || '');
  } catch (e) {
    showStatus('Ошибка: ' + e.message, 'error');
  }
}

function renderBreadcrumbs(path, rootName) {
  const bc = document.getElementById('breadcrumbs');
  bc.style.display = 'flex';
  bc.innerHTML = '';

  const rootLink = document.createElement('a');
  rootLink.textContent = '🏠 ' + (rootName || 'Корень');
  rootLink.onclick = () => navigate('');
  bc.appendChild(rootLink);

  if (path && path !== '/') {
    const parts = path.replace(/^\//, '').split('/');
    let cumulative = '';
    parts.forEach((part, i) => {
      const sep = document.createElement('span');
      sep.textContent = ' / ';
      bc.appendChild(sep);

      cumulative += '/' + part;
      if (i < parts.length - 1) {
        const link = document.createElement('a');
        link.textContent = part;
        const p = cumulative;
        link.onclick = () => navigate(p);
        bc.appendChild(link);
      } else {
        const span = document.createElement('span');
        span.textContent = part;
        span.style.color = '#e0e0e0';
        bc.appendChild(span);
      }
    });
  }
}
