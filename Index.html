<!DOCTYPE html>
<html>
<head>
  <title>Yandex Disk Browser</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    .file { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .folder { font-weight: bold; color: #2196F3; cursor: pointer; }
    a { color: #4CAF50; }
  </style>
</head>
<body>
  <h1>📂 Yandex Disk Browser</h1>
  <input id="url" value="https://disk.yandex.ru/d/iasXYBeFB3Kqew" size="60">
  <button onclick="browse()">Открыть</button>
  <div id="path"></div>
  <div id="files"></div>

  <script>
    const API = 'https://cloud-api.yandex.net/v1/disk/public/resources';

    async function browse(path = '') {
      const publicKey = document.getElementById('url').value;
      let url = `${API}?public_key=${encodeURIComponent(publicKey)}&limit=100`;
      if (path) url += `&path=${encodeURIComponent(path)}`;

      const res = await fetch(url);
      const data = await res.json();

      document.getElementById('path').innerHTML = `<h3>📁 ${data.name} ${path ? '/ ' + path : ''}</h3>`;

      const items = data._embedded?.items || [];
      const filesDiv = document.getElementById('files');
      filesDiv.innerHTML = '';

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'file';

        if (item.type === 'dir') {
          div.innerHTML = `
            <span class="folder" onclick="browse('${item.path}')"}>📁 ${item.name}</span>
          `;
        } else {
          div.innerHTML = `
            <span>📄 ${item.name} (${(item.size / 1024).toFixed(1)} KB)</span>
            <a href="#" onclick="download('${item.path}')">⬇ Скачать</a>
          `;
        }
        filesDiv.appendChild(div);
      });
    }

    async function download(path) {
      const publicKey = document.getElementById('url').value;
      const url = `${API}/download?public_key=${encodeURIComponent(publicKey)}&path=${encodeURIComponent(path)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.href) {
        window.location.href = data.href;
      }
    }
  </script>
</body>
</html>
